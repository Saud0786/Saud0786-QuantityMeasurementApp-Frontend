<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quantity Measurement — Dashboard</title>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Raleway:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- Top Navbar -->
  <header class="navbar">
    <div class="nav-brand">
      <svg viewBox="0 0 40 50" width="26" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="2" width="24" height="34" rx="4" fill="white" opacity="0.9"/>
        <rect x="11" y="27" width="18" height="9" rx="2" fill="#bfd2ff"/>
        <rect x="11" y="17" width="18" height="8" rx="2" fill="#dce9ff" opacity="0.8"/>
        <rect x="4" y="36" width="32" height="8" rx="3" fill="#e2a96a"/>
      </svg>
      <span class="nav-brand-text">Quantity Measurement</span>
    </div>
    <div class="nav-right">
      <span id="userGreet" class="user-greet"></span>
      <button class="logout-btn" onclick="logout()" type="button">Logout</button>
    </div>
  </header>

  <main class="main">

    <!-- Choose Type -->
    <section class="section">
      <p class="section-label">CHOOSE TYPE</p>
      <div class="type-grid" id="typeGrid">

        <div class="type-card active" data-type="length" onclick="selectType(this)">
          <div class="type-icon">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="4" y="17" width="32" height="6" rx="3" fill="#6b8cff"/>
              <rect x="4" y="14" width="3" height="12" rx="1.5" fill="#3b5bdb"/>
              <rect x="33" y="14" width="3" height="12" rx="1.5" fill="#3b5bdb"/>
            </svg>
          </div>
          <span>Length</span>
        </div>

        <div class="type-card" data-type="weight" onclick="selectType(this)">
          <div class="type-icon">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="20" cy="30" rx="14" ry="7" fill="#6b8cff" opacity="0.3"/>
              <path d="M10 28 Q20 12 30 28" stroke="#3b5bdb" stroke-width="2.5" fill="#a5b4fc" fill-opacity="0.4"/>
              <line x1="20" y1="8" x2="20" y2="13" stroke="#3b5bdb" stroke-width="2" stroke-linecap="round"/>
              <circle cx="20" cy="7" r="3" fill="#3b5bdb"/>
            </svg>
          </div>
          <span>Weight</span>
        </div>

        <div class="type-card" data-type="temperature" onclick="selectType(this)">
          <div class="type-icon">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="17" y="5" width="6" height="20" rx="3" fill="#ff6b6b" opacity="0.4"/>
              <rect x="18.5" y="5" width="3" height="18" rx="1.5" fill="#ff6b6b"/>
              <circle cx="20" cy="28" r="5" fill="#ff6b6b"/>
              <line x1="24" y1="11" x2="27" y2="11" stroke="#ff6b6b" stroke-width="1.5"/>
              <line x1="24" y1="15" x2="26" y2="15" stroke="#ff6b6b" stroke-width="1.5"/>
              <line x1="24" y1="19" x2="27" y2="19" stroke="#ff6b6b" stroke-width="1.5"/>
            </svg>
          </div>
          <span>Temperature</span>
        </div>

        <div class="type-card" data-type="volume" onclick="selectType(this)">
          <div class="type-icon">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 8 L9 32 Q9 34 12 34 L28 34 Q31 34 31 32 L28 8 Z" fill="#a78bfa" opacity="0.3"/>
              <path d="M12 8 L9 32 Q9 34 12 34 L28 34 Q31 34 31 32 L28 8 Z" stroke="#7c3aed" stroke-width="2" fill="none"/>
              <path d="M9 22 Q12 20 15 22 Q18 24 21 22 Q24 20 27 22 Q29 23 31 22" stroke="#7c3aed" stroke-width="1.5" fill="none"/>
              <rect x="10" y="6" width="20" height="4" rx="2" fill="#7c3aed"/>
            </svg>
          </div>
          <span>Volume</span>
        </div>

      </div>
    </section>

    <!-- Choose Action -->
    <section class="section">
      <p class="section-label">CHOOSE ACTION</p>
      <div class="action-tabs" id="actionTabs">
        <button class="action-tab active" data-action="comparison"  onclick="selectAction(this)">Comparison</button>
        <button class="action-tab"        data-action="conversion"  onclick="selectAction(this)">Conversion</button>
        <button class="action-tab"        data-action="arithmetic"  onclick="selectAction(this)">Arithmetic</button>
      </div>
    </section>

    <!-- Input Panel -->
    <section class="section input-panel">
      <div id="twoInputLayout">

        <!-- Input A -->
        <div class="input-group">
          <p class="input-label" id="fromLabel">FROM</p>
          <input type="number" id="fromVal" class="num-input" value="1" oninput="calculate()"/>
          <select id="fromUnit" class="unit-select" onchange="syncUnits(); calculate()"></select>
        </div>

        <!-- Middle: arrow or operator dropdown -->
        <div class="operator-box" id="operatorBox">
          <div id="arrowOrOp">
            <svg viewBox="0 0 40 20" width="40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <line x1="4" y1="10" x2="28" y2="10" stroke="#3b5bdb" stroke-width="2.5" stroke-linecap="round"/>
              <polyline points="22,4 32,10 22,16" stroke="#3b5bdb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <!-- Arithmetic op dropdown (built by JS) -->
          <div id="arithOps"></div>
        </div>

        <!-- Input B -->
        <div class="input-group">
          <p class="input-label" id="toLabel">TO</p>
          <input type="number" id="toVal" class="num-input" value="1000" oninput="calculate()"/>
          <select id="toUnit" class="unit-select" onchange="calculate()"></select>
        </div>

      </div>

      <!-- Result -->
      <div class="result-box result-pop" id="resultBox">
        <span id="resultText">Select type and values to begin</span>
      </div>
    </section>

  </main>

  <script src="../js/dashboard.js"></script>
</body>
</html>
