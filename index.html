<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quantity Measurement — Login</title>
  <link rel="stylesheet" href="css/auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Raleway:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="bg-scene">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <div class="auth-card">
    <!-- Left Brand Panel -->
    <div class="brand-panel">
      <div class="brand-icon">
        <svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" width="80">
          <rect x="20" y="5" width="40" height="65" rx="6" fill="#5b8af5" opacity="0.9"/>
          <rect x="25" y="55" width="30" height="15" rx="3" fill="#7ba3ff"/>
          <rect x="25" y="35" width="30" height="12" rx="3" fill="#a8c0ff" opacity="0.7"/>
          <rect x="10" y="70" width="60" height="12" rx="4" fill="#e2a96a"/>
          <rect x="15" y="72" width="8" height="8" rx="1" fill="#c47d3a"/>
          <rect x="27" y="72" width="8" height="8" rx="1" fill="#c47d3a"/>
          <rect x="39" y="72" width="8" height="8" rx="1" fill="#c47d3a"/>
          <rect x="51" y="72" width="8" height="8" rx="1" fill="#c47d3a"/>
          <rect x="63" y="72" width="8" height="8" rx="1" fill="#c47d3a"/>
        </svg>
      </div>
      <h1 class="brand-name">QUANTITY<br/>MEASUREMENT</h1>
      <p class="brand-tagline">Measure, Convert &amp; Compare</p>
      <div class="brand-features">
        <div class="brand-feature"><span class="feat-dot"></span>Length &amp; Weight</div>
        <div class="brand-feature"><span class="feat-dot"></span>Temperature</div>
        <div class="brand-feature"><span class="feat-dot"></span>Volume</div>
      </div>
    </div>

    <!-- Right Form Panel -->
    <div class="form-panel">
      <div class="tabs">
        <button class="tab active" id="loginTab" onclick="switchTab('login')">LOGIN</button>
        <button class="tab" id="signupTab" onclick="switchTab('signup')">SIGNUP</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="loginForm" class="form-section active-form">
        <div class="field">
          <label>Email Id</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" />
        </div>
        <div class="field">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="loginPassword" placeholder="Enter your password" />
            <button class="eye-btn" onclick="togglePw('loginPassword', this)" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div id="loginError" class="error-msg hidden"></div>
        <button class="btn-primary" onclick="doLogin()" type="button">Login</button>
        <p class="switch-link">Don't have an account? <a onclick="switchTab('signup')">Sign Up</a></p>
      </div>

      <!-- SIGNUP FORM -->
      <div id="signupForm" class="form-section hidden-form">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Enter your full name" />
        </div>
        <div class="field">
          <label>Email Id</label>
          <input type="email" id="signupEmail" placeholder="Enter your email" />
        </div>
        <div class="field">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="signupPassword" placeholder="Create a password" oninput="validateSignupPw()" />
            <button class="eye-btn" onclick="togglePw('signupPassword', this)" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span id="pwHint" class="hint-msg hidden">Min 6 characters.</span>
        </div>
        <div class="field">
          <label>Mobile Number</label>
          <input type="tel" id="signupMobile" placeholder="Enter mobile number" oninput="validateMobile()" maxlength="10"/>
          <span id="mobileHint" class="hint-msg hidden">Enter valid 10-digit number.</span>
        </div>
        <div id="signupError" class="error-msg hidden"></div>
        <button class="btn-primary" onclick="doSignup()" type="button">Create Account</button>
        <p class="switch-link">Already have an account? <a onclick="switchTab('login')">Login</a></p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
